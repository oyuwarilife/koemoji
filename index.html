<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こえもじ - 音声→記事変換ツール</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23e8736c'/><stop offset='100%25' stop-color='%23f4a86c'/></linearGradient></defs><circle cx='50' cy='50' r='46' fill='url(%23g)'/><path d='M50 20a10 10 0 0 0-10 10v20a10 10 0 0 0 20 0V30a10 10 0 0 0-10-10z' fill='white'/><path d='M68 45v5a18 18 0 0 1-36 0v-5' stroke='white' stroke-width='4' fill='none' stroke-linecap='round'/><line x1='50' y1='68' x2='50' y2='78' stroke='white' stroke-width='4' stroke-linecap='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #e8736c;
    --primary-dark: #d4564e;
    --primary-light: #fff0ee;
    --accent: #f4a86c;
    --bg-from: #fdf6f0;
    --bg-to: #f0e6f6;
    --card: rgba(255, 255, 255, 0.75);
    --card-border: rgba(255, 255, 255, 0.6);
    --text: #3d2c2c;
    --text-light: #8c7575;
    --border: #edddd6;
    --success: #5cb88a;
    --error: #e8736c;
    --warning: #f4a86c;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: linear-gradient(135deg, var(--bg-from) 0%, #fef4ed 30%, #f5eef8 60%, var(--bg-to) 100%);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 24px;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.05em;
  }

  header h1 svg {
    -webkit-text-fill-color: initial;
    filter: drop-shadow(0 2px 4px rgba(232, 115, 108, 0.3));
  }

  header p {
    color: var(--text-light);
    font-size: 0.95rem;
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  /* Cards - glassmorphism */
  .card {
    background: var(--card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius);
    border: 1px solid var(--card-border);
    box-shadow: 0 4px 24px rgba(180, 140, 130, 0.08), 0 1px 3px rgba(180, 140, 130, 0.06);
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeSlideUp 0.5s ease both;
  }

  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.16s; }
  .card:nth-child(4) { animation-delay: 0.24s; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }

  .step-badge {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(232, 115, 108, 0.25);
  }

  /* Settings toggle */
  .settings-toggle {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  .settings-toggle button {
    background: var(--card);
    backdrop-filter: blur(8px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 0.82rem;
    font-family: inherit;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .settings-toggle button:hover {
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 2px 12px rgba(232, 115, 108, 0.15);
  }

  .settings-panel {
    display: none;
  }

  .settings-panel.open {
    display: block;
    animation: fadeSlideUp 0.4s ease both;
  }

  /* Form elements */
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 5px;
    color: var(--text);
  }

  input[type="password"],
  input[type="text"],
  select,
  textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.3s;
    background: rgba(255,255,255,0.6);
    color: var(--text);
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(232, 115, 108, 0.12);
    background: rgba(255,255,255,0.9);
  }

  .form-row {
    margin-bottom: 14px;
  }

  .form-hint {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .api-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .api-key-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .api-key-row .form-row {
    flex: 1;
    margin-bottom: 0;
  }

  .btn-save-key {
    padding: 11px 16px;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 10px;
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    transition: all 0.3s;
  }

  .btn-save-key:hover {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 10px rgba(232, 115, 108, 0.25);
  }

  .key-status {
    font-size: 0.75rem;
    margin-top: 3px;
  }

  .key-status.saved { color: var(--success); }
  .key-status.empty { color: var(--text-light); }

  /* Audio upload */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    background: rgba(255,255,255,0.3);
  }

  .upload-area:hover, .upload-area.dragover {
    border-color: var(--primary);
    background: var(--primary-light);
    transform: scale(1.01);
  }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  .upload-text {
    font-size: 0.9rem;
    color: var(--text-light);
  }

  .upload-text strong {
    color: var(--primary);
  }

  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--primary-light);
    border-radius: 10px;
    margin-top: 14px;
  }

  .file-info.show {
    display: flex;
    animation: fadeSlideUp 0.3s ease both;
  }

  .file-info .name {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .file-info .size {
    font-size: 0.75rem;
    color: var(--text-light);
  }

  .file-info .remove {
    background: none;
    border: none;
    color: var(--error);
    cursor: pointer;
    font-size: 1.3rem;
    padding: 0 4px;
    transition: transform 0.2s;
  }

  .file-info .remove:hover {
    transform: scale(1.2);
  }

  /* Recording */
  .record-section {
    text-align: center;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .record-or {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 14px;
  }

  .btn-record {
    padding: 12px 30px;
    border: none;
    border-radius: 28px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-record.idle {
    background: linear-gradient(135deg, var(--primary), #e8918b);
    color: white;
    box-shadow: 0 3px 12px rgba(232, 115, 108, 0.3);
  }

  .btn-record.idle:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 18px rgba(232, 115, 108, 0.35);
  }

  .btn-record.recording {
    background: var(--text);
    color: white;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 3px 12px rgba(61, 44, 44, 0.3); }
    50% { opacity: 0.8; box-shadow: 0 3px 20px rgba(61, 44, 44, 0.15); }
  }

  .record-time {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 10px;
    display: none;
    font-variant-numeric: tabular-nums;
  }

  .record-time.show { display: block; }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 3px 14px rgba(232, 115, 108, 0.25);
    letter-spacing: 0.02em;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232, 115, 108, 0.35);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-secondary {
    padding: 9px 18px;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 10px rgba(232, 115, 108, 0.2);
  }

  /* Progress */
  .progress-bar {
    display: none;
    margin-top: 14px;
  }

  .progress-bar.show { display: block; }

  .progress-track {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }

  .progress-fill.indeterminate {
    width: 30%;
    animation: indeterminate 1.5s infinite;
  }

  @keyframes indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  .progress-text {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 8px;
    text-align: center;
  }

  /* Transcript area */
  .transcript-area {
    display: none;
  }

  .transcript-area.show {
    display: block;
    animation: fadeSlideUp 0.5s ease both;
  }

  .transcript-area textarea {
    min-height: 150px;
    resize: vertical;
  }

  .transcript-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  /* Article options */
  .article-options {
    display: none;
  }

  .article-options.show {
    display: block;
    animation: fadeSlideUp 0.5s ease both;
  }

  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  @media (max-width: 600px) {
    .option-grid {
      grid-template-columns: 1fr;
    }
    header h1 {
      font-size: 1.8rem;
    }
    .container {
      padding: 16px;
    }
    .card {
      padding: 22px;
    }
  }

  /* Result */
  .result-area {
    display: none;
  }

  .result-area.show {
    display: block;
    animation: fadeSlideUp 0.5s ease both;
  }

  .result-content {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    font-size: 0.9rem;
    line-height: 1.9;
    white-space: pre-wrap;
    max-height: 500px;
    overflow-y: auto;
  }

  .result-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  /* Status messages */
  .status-msg {
    padding: 11px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-top: 14px;
    display: none;
  }

  .status-msg.show {
    display: block;
    animation: fadeSlideUp 0.3s ease both;
  }
  .status-msg.error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .status-msg.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
  .status-msg.info { background: var(--primary-light); color: var(--primary); border: 1px solid #f5ccc8; }

  /* Footer */
  footer {
    text-align: center;
    padding: 28px 20px;
    color: var(--text-light);
    font-size: 0.75rem;
    letter-spacing: 0.03em;
  }

  /* Prompt template */
  .prompt-toggle {
    font-size: 0.8rem;
    color: var(--primary);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-top: 10px;
    font-family: inherit;
    transition: opacity 0.2s;
  }

  .prompt-toggle:hover {
    opacity: 0.7;
  }

  .prompt-area {
    display: none;
    margin-top: 10px;
  }

  .prompt-area.show {
    display: block;
    animation: fadeSlideUp 0.3s ease both;
  }

  .prompt-area textarea {
    min-height: 100px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#hgrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="hgrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8736c"/><stop offset="100%" stop-color="#f4a86c"/></linearGradient></defs><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      こえもじ
    </h1>
    <p>声を文字に、文字を記事に。</p>
  </header>

  <!-- Settings -->
  <div class="settings-toggle">
    <button onclick="toggleSettings()" id="settingsBtn">API設定</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="card">
      <div class="card-title">APIキー設定</div>
      <p style="font-size: 0.8rem; color: var(--text-light); margin-bottom: 14px;">
        キーはブラウザのlocalStorageに保存されます（サーバーには送信されません）
      </p>
      <div class="api-grid">
        <!-- OpenAI -->
        <div>
          <div class="api-key-row">
            <div class="form-row">
              <label>OpenAI APIキー <span style="font-size:0.75rem; color:var(--text-light)">(文字起こし / 記事化)</span></label>
              <input type="password" id="openaiKey" placeholder="sk-...">
            </div>
            <button class="btn-save-key" onclick="saveKey('openai')">保存</button>
          </div>
          <div class="key-status empty" id="openaiStatus">未設定</div>
        </div>

        <!-- Claude -->
        <div>
          <div class="api-key-row">
            <div class="form-row">
              <label>Claude APIキー <span style="font-size:0.75rem; color:var(--text-light)">(記事化)</span></label>
              <input type="password" id="claudeKey" placeholder="sk-ant-...">
            </div>
            <button class="btn-save-key" onclick="saveKey('claude')">保存</button>
          </div>
          <div class="key-status empty" id="claudeStatus">未設定</div>
        </div>

        <!-- Gemini -->
        <div>
          <div class="api-key-row">
            <div class="form-row">
              <label>Gemini APIキー <span style="font-size:0.75rem; color:var(--text-light)">(文字起こし / 記事化)</span></label>
              <input type="password" id="geminiKey" placeholder="AIza...">
            </div>
            <button class="btn-save-key" onclick="saveKey('gemini')">保存</button>
          </div>
          <div class="key-status empty" id="geminiStatus">未設定</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 1: Audio Input -->
  <div class="card">
    <div class="card-title">
      <span class="step-badge">1</span>
      音声を入力
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" accept="audio/*,video/*,.mp3,.wav,.m4a,.ogg,.webm,.mp4" id="fileInput">
      <div class="upload-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d4a89a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="upload-text">
        <strong>クリックまたはドラッグ&ドロップ</strong><br>
        MP3, WAV, M4A, OGG, WebM, MP4 対応（Whisper: 最大25MB / Gemini: 大容量OK）
      </div>
    </div>

    <div class="file-info" id="fileInfo">
      <span class="name" id="fileName"></span>
      <span class="size" id="fileSize"></span>
      <button class="remove" onclick="removeFile()" title="削除">&times;</button>
    </div>

    <div class="record-section">
      <div class="record-or">または、その場で録音</div>
      <button class="btn-record idle" id="recordBtn" onclick="toggleRecording()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        録音開始
      </button>
      <div class="record-time" id="recordTime">00:00</div>
    </div>

    <div class="progress-bar" id="transcribeProgress">
      <div class="progress-track"><div class="progress-fill indeterminate" id="transcribeFill"></div></div>
      <div class="progress-text" id="transcribeText">文字起こし中...</div>
    </div>

    <div class="status-msg" id="transcribeStatus"></div>

    <div class="form-row" style="margin-top: 16px;">
      <label>文字起こしに使うAI</label>
      <select id="transcribeSelect">
        <option value="gemini">Gemini</option>
        <option value="openai">OpenAI (Whisper)</option>
      </select>
    </div>

    <div>
      <button class="btn-primary" id="transcribeBtn" onclick="transcribe()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
        文字起こしする
      </button>
    </div>
  </div>

  <!-- Step 2: Transcript -->
  <div class="card transcript-area" id="transcriptArea">
    <div class="card-title">
      <span class="step-badge">2</span>
      文字起こし結果
    </div>
    <div class="transcript-header">
      <label style="margin-bottom:0">テキストを編集できます</label>
      <button class="btn-secondary" onclick="copyText('transcriptText')">コピー</button>
    </div>
    <textarea id="transcriptText" rows="8" placeholder="文字起こし結果がここに表示されます..."></textarea>
  </div>

  <!-- Step 3: Article Generation -->
  <div class="card article-options" id="articleOptions">
    <div class="card-title">
      <span class="step-badge">3</span>
      記事を生成
    </div>

    <div class="option-grid">
      <div class="form-row">
        <label>使用するAI</label>
        <select id="llmSelect">
          <option value="gemini">Gemini</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="claude">Claude</option>
        </select>
      </div>
      <div class="form-row">
        <label>記事の形式</label>
        <select id="formatSelect">
          <option value="blog">ブログ記事</option>
          <option value="note">note記事</option>
          <option value="summary">要約・まとめ</option>
          <option value="sns">SNS投稿用</option>
          <option value="minutes">議事録</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
    </div>

    <div class="form-row" style="margin-top: 12px;">
      <label>追加の指示（任意）</label>
      <input type="text" id="extraInstruction" placeholder="例: 見出しを3つ入れて、です・ます調で">
    </div>

    <button class="prompt-toggle" onclick="togglePrompt()">プロンプトを確認・編集</button>
    <div class="prompt-area" id="promptArea">
      <textarea id="promptText"></textarea>
    </div>

    <div class="progress-bar" id="articleProgress">
      <div class="progress-track"><div class="progress-fill indeterminate" id="articleFill"></div></div>
      <div class="progress-text" id="articleProgressText">記事を生成中...</div>
    </div>

    <div class="status-msg" id="articleStatus"></div>

    <div style="margin-top: 16px;">
      <button class="btn-primary" id="articleBtn" onclick="generateArticle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        記事を生成する
      </button>
    </div>
  </div>

  <!-- Result -->
  <div class="card result-area" id="resultArea">
    <div class="card-title">
      <span class="step-badge">4</span>
      生成結果
    </div>
    <div class="result-content" id="resultContent"></div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="copyText('resultContent')">コピー</button>
      <button class="btn-secondary" onclick="downloadResult()">ダウンロード (.md)</button>
      <button class="btn-secondary" onclick="regenerate()">再生成</button>
    </div>
  </div>

  <footer>
    こえもじ &mdash; APIキーはブラウザ内にのみ保存されます
  </footer>
</div>

<script>
// ============================================
// State
// ============================================
let audioFile = null;
let mediaRecorder = null;
let recordedChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;
let isRecording = false;

// ============================================
// API Key Management
// ============================================
function initKeys() {
  ['openai', 'claude', 'gemini'].forEach(provider => {
    const key = localStorage.getItem(`vta_${provider}_key`) || '';
    const input = document.getElementById(`${provider}Key`);
    const status = document.getElementById(`${provider}Status`);
    if (key) {
      input.value = key;
      status.textContent = '設定済み';
      status.className = 'key-status saved';
    }
  });
}

function saveKey(provider) {
  const input = document.getElementById(`${provider}Key`);
  const status = document.getElementById(`${provider}Status`);
  const key = input.value.trim();
  if (key) {
    localStorage.setItem(`vta_${provider}_key`, key);
    status.textContent = '保存しました';
    status.className = 'key-status saved';
  } else {
    localStorage.removeItem(`vta_${provider}_key`);
    status.textContent = '未設定';
    status.className = 'key-status empty';
  }
}

function getKey(provider) {
  return localStorage.getItem(`vta_${provider}_key`) || '';
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  document.getElementById('settingsBtn').textContent =
    panel.classList.contains('open') ? 'API設定を閉じる' : 'API設定';
}

// ============================================
// File Upload
// ============================================
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('dragover', e => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    handleFile(e.dataTransfer.files[0]);
  }
});

fileInput.addEventListener('change', e => {
  if (e.target.files.length) {
    handleFile(e.target.files[0]);
  }
});

function handleFile(file) {
  const maxSize = 25 * 1024 * 1024;
  if (file.size > maxSize) {
    showStatus('transcribeStatus', 'ファイルサイズが25MBを超えています', 'error');
    return;
  }
  audioFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('transcribeBtn').disabled = false;
  hideStatus('transcribeStatus');
}

function removeFile() {
  audioFile = null;
  fileInput.value = '';
  document.getElementById('fileInfo').classList.remove('show');
  document.getElementById('transcribeBtn').disabled = true;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ============================================
// Recording
// ============================================
async function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      recordedChunks = [];
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        audioFile = new File([blob], `recording_${Date.now()}.webm`, { type: 'audio/webm' });
        document.getElementById('fileName').textContent = audioFile.name;
        document.getElementById('fileSize').textContent = formatSize(audioFile.size);
        document.getElementById('fileInfo').classList.add('show');
        document.getElementById('transcribeBtn').disabled = false;
      };
      mediaRecorder.start();
      isRecording = true;
      btn.className = 'btn-record recording';
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> 録音停止';
      recordingSeconds = 0;
      document.getElementById('recordTime').classList.add('show');
      updateRecordTime();
      recordingTimer = setInterval(updateRecordTime, 1000);
    } catch (err) {
      showStatus('transcribeStatus', 'マイクへのアクセスが拒否されました', 'error');
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.className = 'btn-record idle';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg> 録音開始';
    clearInterval(recordingTimer);
  }
}

function updateRecordTime() {
  recordingSeconds++;
  const m = String(Math.floor(recordingSeconds / 60)).padStart(2, '0');
  const s = String(recordingSeconds % 60).padStart(2, '0');
  document.getElementById('recordTime').textContent = `${m}:${s}`;
}

// ============================================
// Transcription (Whisper API)
// ============================================
async function transcribe() {
  const engine = document.getElementById('transcribeSelect').value;
  const key = getKey(engine);
  if (!key) {
    const name = engine === 'gemini' ? 'Gemini' : 'OpenAI';
    showStatus('transcribeStatus', `${name} APIキーを設定してください`, 'error');
    document.getElementById('settingsPanel').classList.add('open');
    return;
  }
  if (!audioFile) return;

  const btn = document.getElementById('transcribeBtn');
  btn.disabled = true;
  document.getElementById('transcribeProgress').classList.add('show');
  hideStatus('transcribeStatus');

  try {
    let text = '';
    if (engine === 'openai') {
      text = await transcribeWithWhisper(key);
    } else {
      text = await transcribeWithGemini(key);
    }

    document.getElementById('transcriptText').value = text;
    document.getElementById('transcriptArea').classList.add('show');
    document.getElementById('articleOptions').classList.add('show');
    updatePrompt();
    showStatus('transcribeStatus', '文字起こし完了', 'success');
  } catch (err) {
    showStatus('transcribeStatus', `エラー: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('transcribeProgress').classList.remove('show');
  }
}

async function transcribeWithWhisper(key) {
  const formData = new FormData();
  formData.append('file', audioFile);
  formData.append('model', 'whisper-1');
  formData.append('language', 'ja');
  formData.append('response_format', 'text');

  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${key}` },
    body: formData
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `OpenAI API Error: ${res.status}`);
  }
  return await res.text();
}

async function transcribeWithGemini(key) {
  const mimeType = audioFile.type || 'audio/mpeg';
  const INLINE_LIMIT = 20 * 1024 * 1024; // 20MB

  let filePart;
  if (audioFile.size <= INLINE_LIMIT) {
    const base64 = await fileToBase64(audioFile);
    filePart = { inlineData: { mimeType, data: base64 } };
  } else {
    // Use Gemini File API for large files
    document.getElementById('transcribeText').textContent = 'ファイルをアップロード中...';
    const fileUri = await uploadToGeminiFileAPI(key, audioFile, mimeType);
    filePart = { fileData: { mimeType, fileUri } };
  }

  document.getElementById('transcribeText').textContent = '文字起こし中...';

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          filePart,
          { text: 'この音声を日本語で文字起こししてください。フィラー（あー、えー、うーん、えーと等）は除去してください。話し言葉の内容は正確に残しつつ、余計な説明や前置きは不要です。文字起こし結果のみを出力してください。' }
        ]
      }],
      generationConfig: { temperature: 0.1 }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Gemini API Error: ${res.status}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function uploadToGeminiFileAPI(key, file, mimeType) {
  // Start resumable upload
  const startRes = await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${key}`, {
    method: 'POST',
    headers: {
      'X-Goog-Upload-Protocol': 'resumable',
      'X-Goog-Upload-Command': 'start',
      'X-Goog-Upload-Header-Content-Length': file.size,
      'X-Goog-Upload-Header-Content-Type': mimeType,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ file: { displayName: file.name } })
  });

  if (!startRes.ok) {
    const err = await startRes.json().catch(() => ({}));
    throw new Error(err.error?.message || 'File upload start failed');
  }

  const uploadUrl = startRes.headers.get('X-Goog-Upload-URL');
  if (!uploadUrl) throw new Error('Upload URL not returned');

  // Upload the file
  const uploadRes = await fetch(uploadUrl, {
    method: 'PUT',
    headers: {
      'Content-Length': file.size,
      'X-Goog-Upload-Offset': '0',
      'X-Goog-Upload-Command': 'upload, finalize'
    },
    body: file
  });

  if (!uploadRes.ok) {
    throw new Error('File upload failed');
  }

  const uploadData = await uploadRes.json();
  const fileUri = uploadData.file.uri;

  // Wait for file to be processed
  const fileName = uploadData.file.name;
  let state = uploadData.file.state;
  while (state === 'PROCESSING') {
    await new Promise(r => setTimeout(r, 2000));
    const checkRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/${fileName}?key=${key}`);
    const checkData = await checkRes.json();
    state = checkData.state;
    if (state === 'FAILED') throw new Error('File processing failed');
  }

  return fileUri;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================
// Article Generation
// ============================================
const PROMPTS = {
  blog: `以下の文字起こしテキストを、読みやすいブログ記事に変換してください。

要件:
- 適切な見出し（##, ###）をつける
- 話し言葉を自然な書き言葉に整える
- 段落を適切に分ける
- 重要なポイントを強調する
- 冗長な部分は簡潔にまとめる`,

  note: `以下の文字起こしテキストを、note記事に変換してください。

要件:
- タイトルをつける（読者が読みたくなるもの）
- 導入文で読者の共感を得る
- 見出し（##）で内容を整理
- 体験ベースの語り口を活かす
- 最後にまとめ or 読者への問いかけ`,

  summary: `以下の文字起こしテキストを、要約・まとめに変換してください。

要件:
- 箇条書きで要点を整理
- 重要度の高い順に並べる
- 具体的な数値やキーワードは残す
- 全体の3分の1程度の分量に`,

  sns: `以下の文字起こしテキストから、SNS投稿を複数作成してください。

要件:
- 1投稿140文字以内（X向け）
- 3〜5パターン作成
- 読者が反応したくなるフック
- 具体的なエピソードを抽出`,

  minutes: `以下の文字起こしテキストを、議事録に変換してください。

要件:
- 日時・参加者（わかれば）
- 議題ごとに整理
- 決定事項を明確に
- TODO・次のアクションを抽出
- 箇条書きで簡潔に`,

  custom: `以下の文字起こしテキストを、指定された形式で記事に変換してください。`
};

function updatePrompt() {
  const format = document.getElementById('formatSelect').value;
  document.getElementById('promptText').value = PROMPTS[format] || PROMPTS.blog;
}

document.getElementById('formatSelect').addEventListener('change', updatePrompt);

function togglePrompt() {
  document.getElementById('promptArea').classList.toggle('show');
}

async function generateArticle() {
  const llm = document.getElementById('llmSelect').value;
  const key = getKey(llm);
  if (!key) {
    showStatus('articleStatus', `${llm.charAt(0).toUpperCase() + llm.slice(1)} APIキーを設定してください`, 'error');
    document.getElementById('settingsPanel').classList.add('open');
    return;
  }

  const transcript = document.getElementById('transcriptText').value.trim();
  if (!transcript) {
    showStatus('articleStatus', '文字起こしテキストがありません', 'error');
    return;
  }

  const prompt = document.getElementById('promptText').value;
  const extra = document.getElementById('extraInstruction').value.trim();
  const fullPrompt = prompt + (extra ? `\n\n追加の指示: ${extra}` : '') + `\n\n---\n\n${transcript}`;

  const btn = document.getElementById('articleBtn');
  btn.disabled = true;
  document.getElementById('articleProgress').classList.add('show');
  hideStatus('articleStatus');

  try {
    let result = '';
    if (llm === 'openai') {
      result = await callOpenAI(key, fullPrompt);
    } else if (llm === 'claude') {
      result = await callClaude(key, fullPrompt);
    } else if (llm === 'gemini') {
      result = await callGemini(key, fullPrompt);
    }

    document.getElementById('resultContent').textContent = result;
    document.getElementById('resultArea').classList.add('show');
    showStatus('articleStatus', '記事を生成しました', 'success');
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    showStatus('articleStatus', `エラー: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('articleProgress').classList.remove('show');
  }
}

async function callOpenAI(key, prompt) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'gpt-4o',
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.7
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `OpenAI API Error: ${res.status}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callClaude(key, prompt) {
  // Claude API requires CORS proxy or direct access
  // Using anthropic API directly with dangerous-direct-browser-access header
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4096,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Claude API Error: ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

async function callGemini(key, prompt) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7 }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Gemini API Error: ${res.status}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function regenerate() {
  document.getElementById('resultArea').classList.remove('show');
  generateArticle();
}

// ============================================
// Utilities
// ============================================
function copyText(elementId) {
  const el = document.getElementById(elementId);
  const text = el.value || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('コピーしました');
  });
}

function downloadResult() {
  const text = document.getElementById('resultContent').textContent;
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `article_${new Date().toISOString().slice(0, 10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function showStatus(id, message, type) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.className = `status-msg show ${type}`;
}

function hideStatus(id) {
  document.getElementById(id).className = 'status-msg';
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 0.85rem; z-index: 1000;
    animation: fadeInUp 0.3s ease;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// Add animation
const style = document.createElement('style');
style.textContent = `@keyframes fadeInUp { from { opacity:0; transform:translate(-50%,10px); } to { opacity:1; transform:translate(-50%,0); } }`;
document.head.appendChild(style);

// ============================================
// Init
// ============================================
initKeys();
updatePrompt();
</script>

</body>
</html>
